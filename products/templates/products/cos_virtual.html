{% extends 'products/base.html' %}

{% block title %}Cos Virtual - Secured Systems{% endblock %}

{% block content %}
<div class="container-narrow">
    <h1 class="page-title">
        <i class="fas fa-shopping-cart"></i> Cosul tau
    </h1>
    
    <div id="cos-continut">
    </div>
    
    <div id="cos-gol" class="empty-state hidden">
        <i class="fas fa-shopping-cart"></i>
        <p>Cosul tau este gol.</p>
        <a href="{% url 'produse' %}" class="btn btn-primary mt-20">
            <i class="fas fa-arrow-left"></i> Vezi produsele
        </a>
    </div>
    
    <div id="cos-total" class="cart-total hidden">
        <div class="cart-total-inner">
            <div>
                <p class="cart-total-label">Total de plata:</p>
                <h3 id="total-pret">0 LEI</h3>
            </div>
            <div class="cart-total-actions">
                <button onclick="golesteCosu()" class="btn btn-secondary">
                    <i class="fas fa-trash"></i> Goleste cosul
                </button>
                <button onclick="trimiteComanda()" class="btn btn-orange">
                    <i class="fas fa-credit-card"></i> Finalizeaza comanda
                </button>
            </div>
        </div>
    </div>
</div>

<script>
function afiseazaCos() {
    let cos = JSON.parse(localStorage.getItem('cos') || '[]');
    let container = document.getElementById('cos-continut');
    let cosGol = document.getElementById('cos-gol');
    let cosTotal = document.getElementById('cos-total');
    
    if (cos.length === 0) {
        container.innerHTML = '';
        cosGol.classList.remove('hidden');
        cosTotal.classList.add('hidden');
        return;
    }
    
    cosGol.classList.add('hidden');
    cosTotal.classList.remove('hidden');
    
    let html = '';
    let total = 0;
    
    cos.forEach((item, index) => {
        let subtotal = item.pret * item.cantitate;
        total += subtotal;
        
        html += `
        <div class="cart-item">
            <img src="${item.imagine}" alt="${item.nume}">
            <div class="cart-item-info">
                <h3 class="cart-item-name">
                    <a href="/produs/${item.slug}">${item.nume}</a>
                </h3>
                <div class="cart-item-price">${item.pret} LEI / buc</div>
                <div class="cart-item-qty">
                    <button onclick="modificaCantitate(${index}, -1)">-</button>
                    <span>${item.cantitate}</span>
                    <button onclick="modificaCantitate(${index}, 1)">+</button>
                </div>
            </div>
            <div class="text-right">
                <div class="cart-item-subtotal">${subtotal.toFixed(2)} LEI</div>
                <button onclick="stergeDinCos(${index})" class="cart-item-remove">
                    <i class="fas fa-trash"></i> Sterge
                </button>
            </div>
        </div>
        `;
    });
    
    container.innerHTML = html;
    document.getElementById('total-pret').textContent = total.toFixed(2) + ' LEI';
}

function trimiteComanda() {
    let cos = JSON.parse(localStorage.getItem('cos') || '[]');
    if (cos.length === 0) {
        alert("Cosul e gol!");
        return;
    }
    fetch("{% url 'finalizeaza_comanda' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": "{{ csrf_token }}"
        },
        body: JSON.stringify({ produse: cos })
    })
    .then(response => {
        if (response.ok) {
            alert("Comanda a fost trimisa! Verifică mail-ul pentru factura.");
            localStorage.removeItem('cos');
            window.location.href = "/cos_virtual/"; 
        } else {
            alert("Eroare la procesarea comenzii.");
        }
    });
}

function modificaCantitate(index, delta) {
    let cos = JSON.parse(localStorage.getItem('cos') || '[]');
    
    if (cos[index]) {
        cos[index].cantitate += delta;
        
        if (cos[index].cantitate <= 0) {
            cos.splice(index, 1);
        } else if (cos[index].cantitate > cos[index].stoc) {
            alert('Nu mai avem in stoc!');
            cos[index].cantitate = cos[index].stoc;
        }
        
        localStorage.setItem('cos', JSON.stringify(cos));
        afiseazaCos();
    }
}

function stergeDinCos(index) {
    if (confirm('Stergi produsul din cos?')) {
        let cos = JSON.parse(localStorage.getItem('cos') || '[]');
        cos.splice(index, 1);
        localStorage.setItem('cos', JSON.stringify(cos));
        afiseazaCos();
    }
}

function golesteCosu() {
    if (confirm('Esti sigur ca vrei sa golesti cosul?')) {
        localStorage.removeItem('cos');
        afiseazaCos();
    }
}

document.addEventListener('DOMContentLoaded', afiseazaCos);
</script>
{% endblock %}
